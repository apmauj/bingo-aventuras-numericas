services:
  - type: web
    name: bingo-server
    runtime: node
    rootDir: mini-services/bingo-server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        sync: false  # Lo configurás desde el dashboard de Render
    plan: free
    